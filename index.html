<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galaxy Forge</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loading-screen">

    <div class="loader-content">

        <h1 class="loader-title">
            🌌 GALAXY FORGE
        </h1>

        <div class="loader-bar">

            <div class="loader-progress"></div>

        </div>

        <div id="loading-text">
            Initializing Universe...
        </div>

    </div>

</div>

<div class="stars"></div>

<header class="hero">

<h1>🌌 GALAXY FORGE</h1>

<p>
Gaming • Space • Cyberpunk Wallpapers
</p>

<button onclick="showRandomWallpaper()">
🎲 Random Wallpaper
</button>

</header>

<section class="top-bar">

<input
type="text"
id="searchInput"
placeholder="Search wallpapers..."
onkeyup="searchWallpaper()"
>

</section>

<section class="filters">

<button onclick="filterWallpapers('all')">
All
</button>

<button onclick="filterWallpapers('space')">
Space
</button>

<button onclick="filterWallpapers('gaming')">
Gaming
</button>

<button onclick="filterWallpapers('aesthetic')">
Aesthetic
</button>

</section>

<h2 class="section-title">
🌠 Wallpaper Collection
</h2>

<div id="gallery" class="gallery"></div>

<div id="preview" class="preview">

<span onclick="closePreview()">
✖
</span>

<img id="previewImg">

</div>

<script src="script.js"></script>

</body>
</html>
