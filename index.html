<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galaxy Forge</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<header class="hero">

<h1>🌌 GALAXY FORGE</h1>

<p>
Gaming • Space • Cyberpunk Wallpapers
</p>

<button onclick="showRandomWallpaper()">
🎲 Random Wallpaper
</button>

</header>

<section class="top-bar">

<input
type="text"
id="searchInput"
placeholder="Search wallpapers..."
onkeyup="searchWallpaper()"
>

</section>

<section class="filters">

<button onclick="filterWallpapers('all')">
All
</button>

<button onclick="filterWallpapers('space')">
Space
</button>

<button onclick="filterWallpapers('gaming')">
Gaming
</button>

<button onclick="filterWallpapers('aesthetic')">
Aesthetic
</button>

</section>

<section class="stats">

<div class="stat-card">
<h2>8</h2>
<p>Wallpapers</p>
</div>

<div class="stat-card">
<h2>3</h2>
<p>Categories</p>
</div>

<div class="stat-card">
<h2>∞</h2>
<p>Downloads</p>
</div>

</section>

<h2 class="section-title">
🌠 Wallpaper Collection
</h2>

<div id="gallery" class="gallery"></div>

<div id="preview" class="preview">

<span onclick="closePreview()">
✖
</span>

<img id="previewImg">

</div>

<script src="script.js"></script>

</body>
</html>
