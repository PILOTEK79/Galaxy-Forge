<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Forge</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->

<div id="loader">
  <div class="loader-content">
    <h1>🌌 GALAXY FORGE</h1>
    <p>Initializing Universe...</p>

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <div id="progress-text">0%</div>
  </div>
</div>

<!-- MAIN SITE -->

<div class="container">

    <header>

        <h1>🌌 GALAXY FORGE</h1>

        <p>Gaming • Space • Cyberpunk Wallpapers</p>

        <button id="randomBtn">
            🎲 Random Wallpaper
        </button>

    </header>

    <input
        type="text"
        id="search"
        placeholder="Search wallpapers..."
    >

    <div class="filters">

        <button>All</button>
        <button>Space</button>
        <button>Gaming</button>
        <button>Aesthetic</button>

    </div>

    <div class="stats">

        <div>
            <h2>8</h2>
            <p>Wallpapers</p>
        </div>

        <div>
            <h2>3</h2>
            <p>Categories</p>
        </div>

        <div>
            <h2>∞</h2>
            <p>Downloads</p>
        </div>

    </div>

    <h2 class="section-title">
        ⭐ Wallpaper Collection
    </h2>

    <div class="gallery" id="gallery">
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
